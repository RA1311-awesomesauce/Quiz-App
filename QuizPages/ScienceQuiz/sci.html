<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="scistyle.css" rel="stylesheet">
    <title>Science Quiz</title>
</head>

<body>
    <section id="glass">
        <h1 style="text-align: center; margin: 10px 0px; color: azure;">Science Quiz</h1>
        <div class="container">
            <div class="question">
                <h3 style="text-align: center; font-size: 18px; letter-spacing: 1px;">What is the long form of DNA?</h3>
                <div class="answerGrid">
                    <button onclick="wrongAns()">There is no long form</button>
                    <button onclick="wrongAns()">Different Natural Actions</button>
                    <button onclick="correctAns()">Deoxyribonucleic acid</button>
                    <button onclick="wrongAns()">Dexynomial acid/button>
                </div>
            </div>
            <div class="question">
                <h3 style="text-align: center; font-size: 18px; letter-spacing: 1px;">What is the study of living things called?</h3>
                <div class="answerGrid">
                    <button onclick="wrongAns()">idk bro</button>
                    <button onclick="wrongAns()">Geology</button>
                    <button onclick="wrongAns()">Etymology</button>
                    <button onclick="correctAns()">Biology</button>
                </div>
            </div>
            <div class="question">
                <h3 style="text-align: center; font-size: 18px; letter-spacing: 1px;">What are dominant genes?<h3>
                <div class="answerGrid">
                    <button onclick="correctAns()">A stronger gene that overrides another, and that is more likely to appear in an offspring</button>
                    <button onclick="wrongAns()">Genes that appear in most of the world's population</button>
                    <button onclick="wrongAns()">Genes that are less common in one area, but more common in another</button>
                    <button onclick="wrongAns()">Weaker genes</button>
                </div>
            </div>
            <div class="question">
                <h3 style="text-align: center; font-size: 18px; letter-spacing: 1px;">Who came up with the formula e=mc^2?<h3>
                <div class="answerGrid">
                    <button onclick="wrongAns()">Thomas Edison</button>
                    <button onclick="correctAns()">Albert Einstein</button>
                    <button onclick="wrongAns()">John J. Franklin</button>
                    <button onclick="wrongAns()">Edwin Raft</button>
                </div>
            </div>
            <div class="question">
                <h3 style="text-align: center; font-size: 18px; letter-spacing: 1px;">What happens when tectonic plates shift?</h3>
                <div class="answerGrid">
                    <button onclick="wrongAns()">You will feel dizzy</button>
                    <button onclick="wrongAns()">A volcano will erupt</button>
                    <button onclick="correctAns()">An earthquake will occur</button>
                    <button onclick="wrongAns()">A heatwave will occur over the area of the fault line</button>
                </div>
            </div>
        </div>
    </section>
    <script src="sciscript.js"></script>
</body>
</html>
